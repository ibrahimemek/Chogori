services:
  catalog-api:
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  inventory-api:
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  order-api:
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  payment-api:
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  shipping-api:
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  notification-api:
    ports:
      - "5006:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    ports:
      - "6379:6379"

  elasticsearch:
    ports:
      - "9200:9200"